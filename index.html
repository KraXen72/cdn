<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cdn</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');

        :root {
            --flexoki-bg: #100F0F;
            --flexoki-bg-2: #1C1B1A;
            --flexoki-ui: #282726;
            --flexoki-ui-2: #343331;
            --flexoki-ui-3: #403E3C;
            --flexoki-tx-3: #575653;
            --flexoki-tx-2: #878580;
            --flexoki-tx: #CECDC3;
            --flexoki-red: #D14D41;
            --flexoki-orange: #DA702C;
            --flexoki-yellow: #D0A215;
            --flexoki-green: #879A39;
            --flexoki-cyan: #3AA99F;
            --flexoki-blue: #4385BE;
            --flexoki-purple: #8B7EC8;
            --flexoki-magenta: #CE5D97;
            --width: 720px;
            --font-main: 'Inter', sans-serif;
            --font-secondary: 'Inter', sans-serif;
            --font-scale: 16px;
            --background-color: var(--flexoki-bg);
            --heading-color: var(--flexoki-tx);
            --text-color: var(--flexoki-tx);
            --link-color: var(--flexoki-cyan);
            --code-background-color: var(--flexoki-bg-2);
            --code-color: var(--flexoki-tx);
            --blockquote-color: var(--flexoki-tx-2);
        }

        body {
            font-family: var(--font-secondary);
            font-size: var(--font-scale);
            font-weight: 445;
            margin: auto;
            padding: 20px;
            max-width: var(--width);
            text-align: left;
            background-color: var(--background-color);
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.5;
            color: var(--text-color);
        }

        h2 {
            font-family: var(--font-main);
            color: var(--heading-color);
            border-bottom: 2px solid var(--flexoki-cyan);
            padding-bottom: 8px;
            margin-bottom: 24px;
            font-size: var(--font-scale);
        }

        h3 {
            font-family: var(--font-main);
            color: var(--heading-color);
            margin-bottom: 12px;
            margin-top: 24px;
            font-size: var(--font-scale);
        }

        ul {
            list-style: disc;
            padding-left: 20px;
            margin: 0;
        }

        li {
            margin: 8px 0;
        }

        a {
            color: var(--link-color);
            cursor: pointer;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        code {
            font-family: monospace;
            padding: 2px;
            background-color: var(--code-background-color);
            color: var(--code-color);
            border-radius: 3px;
        }

        blockquote {
            border-left: 1px solid #999;
            color: var(--blockquote-color);
            padding-left: 20px;
            font-style: italic;
        }
    </style>
</head>
