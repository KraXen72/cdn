<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaisyUI Theme URL Generator</title>
  <style>
    :root {
      --bg:    #FFFCF0;
      --bg-2:  #F2F0E5;
      --ui:    #E6E4D9;
      --ui-2:  #DAD8CE;
      --ui-3:  #CECDC3;
      --tx:    #100F0F;
      --tx-2:  #6F6E69;
      --tx-3:  #B7B5AC;
      --blue:  #205EA6;
      --green: #66800B;
      --red:   #AF3029;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--tx);
      padding: 1.5rem;
      line-height: 1.5;
      min-height: 100vh;
    }

    .container { max-width: 820px; margin: 0 auto; }

    header { margin-bottom: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .subtitle { color: var(--tx-2); font-size: 0.875rem; }
    .subtitle code {
      font-family: monospace;
      background: var(--ui);
      padding: 0.1em 0.35em;
      border-radius: 0.25rem;
      font-size: 0.85em;
    }

    .card {
      background: var(--bg-2);
      border: 1px solid var(--ui);
      border-radius: 0.75rem;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    h2 { font-size: 1rem; font-weight: 600; }

    textarea {
      width: 100%;
      height: 18rem;
      padding: 0.75rem;
      background: var(--bg);
      color: var(--tx);
      border: 1px solid var(--ui);
      border-radius: 0.5rem;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 0.8125rem;
      resize: vertical;
      line-height: 1.6;
    }
    textarea:focus { outline: 2px solid var(--blue); outline-offset: -1px; border-color: transparent; }

    .url-box {
      background: var(--bg);
      border: 1px solid var(--ui);
      border-radius: 0.5rem;
      padding: 0.75rem;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 0.8125rem;
      word-break: break-all;
      min-height: 3.25rem;
      display: flex;
      align-items: center;
    }
    .url-box a { color: var(--blue); text-decoration: none; }
    .url-box a:hover { text-decoration: underline; }
    .url-box .empty { color: var(--tx-3); font-family: inherit; }

    .btn {
      padding: 0.4rem 0.875rem;
      font-size: 0.875rem;
      border-radius: 0.5rem;
      cursor: pointer;
      border: 1px solid var(--ui-2);
      background: var(--ui);
      color: var(--tx);
      line-height: 1.4;
      transition: background 0.1s;
    }
    .btn:hover { background: var(--ui-2); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; background: var(--blue); }

    .error {
      color: var(--red);
      font-size: 0.8125rem;
      margin-top: 0.6rem;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>DaisyUI Theme URL Generator</h1>
      <p class="subtitle">Paste a <code>@plugin "daisyui/theme" { }</code> block to get a theme generator link</p>
    </header>

    <div class="card">
      <div class="card-header">
        <h2>Theme Definition</h2>
        <button id="clear-btn" class="btn">Clear</button>
      </div>
      <textarea id="input" spellcheck="false" autocomplete="off" placeholder='@plugin "daisyui/theme" {
  name: "my-theme";
  default: false;
  prefersdark: false;
  color-scheme: "light";
  --color-base-100: oklch(97% 0.008 17.911);
  --color-base-200: oklch(93.5% 0.007 17.911);
  --color-primary: oklch(68.628% 0.185 148.958);
  --color-primary-content: oklch(0% 0 0);
  ...
}'></textarea>
      <div id="error" class="error" style="display:none;"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Theme Generator URL</h2>
        <button id="copy-btn" class="btn btn-primary" disabled>📋 Copy URL</button>
      </div>
      <div id="url-box" class="url-box">
        <span class="empty">Paste a theme definition above…</span>
      </div>
    </div>
  </div>

  <script>
    const inputEl  = document.getElementById('input');
    const errorEl  = document.getElementById('error');
    const urlBox   = document.getElementById('url-box');
    const copyBtn  = document.getElementById('copy-btn');
    const clearBtn = document.getElementById('clear-btn');

    let currentUrl = '';

    function stripCssComments(css) {
      return css.replace(/\/\*[\s\S]*?\*\//g, '');
    }

    function parseTheme(raw) {
      let body = stripCssComments(raw).trim();

      // Strip @plugin wrapper if present, being lenient about the plugin string
      const wrapped = body.match(/@plugin\s+["'][^"']*["']\s*\{([\s\S]*?)\}\s*$/);
      if (wrapped) body = wrapped[1];

      const result = {};
      for (const line of body.split('\n')) {
        // Match:  key : value ;   (semicolon optional, value may contain spaces/parens)
        const m = line.match(/^\s*([\w-]+)\s*:\s*(.+?)\s*;?\s*$/);
        if (!m) continue;

        const key = m[1];
        let val = m[2].trim();

        // Strip surrounding quotes
        if (val.length >= 2 && (
          (val[0] === '"'      && val.at(-1) === '"')  ||
          (val[0] === "'"      && val.at(-1) === "'")  ||
          (val[0] === '\u201c' && val.at(-1) === '\u201d')
        )) val = val.slice(1, -1);

        if (val === 'true')       result[key] = true;
        else if (val === 'false') result[key] = false;
        else                      result[key] = val;
      }

      if (
        !(
          "color-scheme" in result &&
          typeof result["color-scheme"] === "string" &&
          result["color-scheme"].trim() !== ""
        )
      ) {
        result["color-scheme"] = "light";
      }
      if (!("default" in result && typeof result.default === "boolean"))
        result["default"] = false;
      if (!("prefersdark" in result && typeof result.prefersdark === "boolean"))
        result["prefersdark"] = false;

      if (!result.name) throw new Error('Missing required "name" property');
      return result;
    }

    async function deflate64(obj) {
      const bytes = new TextEncoder().encode(JSON.stringify(obj));
      const cs    = new CompressionStream('deflate');
      const w     = cs.writable.getWriter();
      w.write(bytes);
      w.close();

      const chunks = [];
      const r = cs.readable.getReader();
      for (;;) {
        const { done, value } = await r.read();
        if (done) break;
        chunks.push(value);
      }

      const total = chunks.reduce((n, c) => n + c.length, 0);
      const buf = new Uint8Array(total);
      let off = 0;
      for (const c of chunks) { buf.set(c, off); off += c.length; }

      // Safe binary string conversion (avoids spread stack overflow on large buffers)
      let binary = '';
      const CHUNK = 8192;
      for (let i = 0; i < buf.length; i += CHUNK)
        binary += String.fromCharCode(...buf.subarray(i, i + CHUNK));

      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    let timer;
    async function process() {
      clearTimeout(timer);
      timer = setTimeout(async () => {
        const raw = inputEl.value.trim();
        errorEl.style.display = 'none';

        if (!raw) {
          urlBox.innerHTML = '<span class="empty">Paste a theme definition above…</span>';
          copyBtn.disabled = true;
          currentUrl = '';
          return;
        }

        try {
          const theme   = parseTheme(raw);
          const encoded = await deflate64(theme);
          currentUrl    = `https://daisyui.com/theme-generator/#theme=${encoded}`;
          urlBox.innerHTML = `<a href="${currentUrl}" target="_blank" rel="noopener">${currentUrl}</a>`;
          copyBtn.disabled = false;
        } catch (e) {
          errorEl.textContent    = e.message;
          errorEl.style.display  = 'block';
          urlBox.innerHTML       = '<span class="empty">Fix the error above to generate a URL</span>';
          copyBtn.disabled       = true;
          currentUrl             = '';
        }
      }, 180);
    }

    inputEl.addEventListener('input', process);
    inputEl.addEventListener('paste', () => setTimeout(process, 0));

    clearBtn.addEventListener('click', () => { inputEl.value = ''; process(); });

    copyBtn.addEventListener('click', async () => {
      if (!currentUrl) return;
      try {
        await navigator.clipboard.writeText(currentUrl);
      } catch {
        // Fallback for non-secure contexts
        const ta = Object.assign(document.createElement('textarea'),
          { value: currentUrl, style: 'position:fixed;opacity:0' });
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      const orig = copyBtn.innerHTML;
      copyBtn.innerHTML = '✓ Copied!';
      setTimeout(() => copyBtn.innerHTML = orig, 2000);
    });
  </script>
</body>
</html>
